[package]
name = "teleflow-desktop"
version = "0.1.0"
description = "Teleflow 2025 Desktop App"
authors = ["Teleflow Team"]
edition = "2021"

[build-dependencies]
tauri-build = { version = "2.0.0", features = [] }

[dependencies]
tauri = { version = "2.0.0", features = [] }
tauri-plugin-shell = "2.0.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
sqlx = { version = "0.7", features = ["runtime-tokio-rustls", "sqlite", "migrate", "uuid", "chrono"] }
chromiumoxide = { version = "0.5", features = ["tokio-runtime"] }
thiserror = "1.0"
anyhow = "1.0"
log = "0.4"
env_logger = "0.10"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.4", features = ["serde", "v4"] }
futures = "0.3"
url = "2.4"

[features]
custom-protocol = ["tauri/custom-protocol"]
